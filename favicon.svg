<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo oscuro -->
  <rect width="32" height="32" rx="6" fill="#161a24"/>
  <!-- Páginas apiladas (evoca directorio/carpeta) -->
  <!-- Página trasera -->
  <rect x="10" y="8" width="14" height="17" rx="2" fill="#2a3045"/>
  <!-- Página del medio -->
  <rect x="8" y="10" width="14" height="17" rx="2" fill="#1e2332"/>
  <!-- Página principal -->
  <rect x="6" y="7" width="14" height="18" rx="2" fill="#1e2332" stroke="#2a3045" stroke-width="0.5"/>
  <!-- Líneas de texto (naranjas) -->
  <rect x="9" y="11" width="8" height="1.5" rx="0.75" fill="#e8a020"/>
  <rect x="9" y="14" width="6" height="1.5" rx="0.75" fill="#e8a020" opacity="0.7"/>
  <rect x="9" y="17" width="7" height="1.5" rx="0.75" fill="#e8a020" opacity="0.5"/>
  <rect x="9" y="20" width="5" height="1.5" rx="0.75" fill="#e8a020" opacity="0.3"/>
  <!-- Lupa naranja -->
  <circle cx="22" cy="22" r="5" fill="#161a24"/>
  <circle cx="22" cy="22" r="4" fill="none" stroke="#e8a020" stroke-width="2"/>
  <line x1="25" y1="25" x2="28" y2="28" stroke="#e8a020" stroke-width="2" stroke-linecap="round"/>
</svg>
